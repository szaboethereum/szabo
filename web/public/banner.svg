<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <rect width="1500" height="500" fill="#0a0a0a"/>
  
  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="1500" y2="100" stroke="#ffb000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="200" x2="1500" y2="200" stroke="#ffb000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="300" x2="1500" y2="300" stroke="#ffb000" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="1500" y2="400" stroke="#ffb000" stroke-width="0.5" opacity="0.05"/>
  
  <!-- Left side: denomination stack -->
  <text x="80" y="180" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#ffb000" opacity="0.25">1 wei</text>
  <text x="80" y="200" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#ffb000" opacity="0.25">1 kwei</text>
  <text x="80" y="220" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#ffb000" opacity="0.25">1 mwei</text>
  <text x="80" y="240" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#ffb000" opacity="0.25">1 gwei</text>
  <text x="80" y="260" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14" fill="#ffb000" opacity="0.9">1 szabo ← 10^12 wei</text>
  <text x="80" y="280" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#ffb000" opacity="0.25">1 finney</text>
  <text x="80" y="300" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#ffb000" opacity="0.25">1 ether</text>
  
  <!-- Center: main title -->
  <text x="750" y="240" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="72" fill="#ffb000" letter-spacing="12">SZABO</text>
  <text x="750" y="290" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14" fill="#ffb000" opacity="0.5">on-chain terminal tablets // 2,000 edition</text>
  
  <!-- Right side: traits hint -->
  <text x="1200" y="180" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#ffb000" opacity="0.3">essay: shelling out</text>
  <text x="1200" y="200" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#ffb000" opacity="0.3">inscription: dense</text>
  <text x="1200" y="220" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#ffb000" opacity="0.3">terminal: amber</text>
  <text x="1200" y="240" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#ffb000" opacity="0.3">frame: ornate</text>
  <text x="1200" y="260" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#ffb000" opacity="0.3">symbol: cypherpunk</text>
  <text x="1200" y="290" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#ffb000" opacity="0.15">rarity: 0.0075%</text>
  
  <!-- Bottom bar -->
  <line x1="60" y1="420" x2="1440" y2="420" stroke="#ffb000" stroke-width="1" opacity="0.15"/>
  <text x="80" y="450" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#ffb000" opacity="0.3">nick szabo // smart contracts (1994) // bit gold (1998) // shelling out (2002)</text>
  <text x="1420" y="450" text-anchor="end" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#ffb000" opacity="0.3">no ipfs. no oracle. no team.</text>
</svg>
